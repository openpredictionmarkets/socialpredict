openapi: 3.0.3
info:
  title: SocialPredict API
  version: 0.1.0
  description: >
    HTTP contract for the SocialPredict backend service. This spec is generated
    from the Go handlers and DTOs under backend/server and backend/handlers.
    Routes wrapped by the shared security middleware can return a shared
    transport-level `429` JSON failure envelope response before reaching handler-specific
    JSON envelope logic when the process-local in-memory rate limit is exceeded.
    This middleware exception applies across protected routes even when a path
    omits a repeated path-level `429` entry. Runtime bootstrap owns JWT
    signing-key presence, trusted proxy header posture, CORS defaults, and
    security header/HSTS posture before route registration. Forwarded client
    identity headers are ignored unless the runtime proxy-trust contract opts in.
    Public `reason` values are contract vocabulary for clients and are kept
    separate from runtime telemetry classifications such as `error.type`.
servers:
  - url: http://localhost:8080
    description: Local dev server
tags:
  - name: Auth
    description: Authentication and session management.
  - name: Config
    description: Health and configuration endpoints.
  - name: Markets
    description: Market creation, listing, search, and resolution.
  - name: Bets
    description: Placing and selling bets.
  - name: Users
    description: Public and private user profile and financial data.
  - name: Metrics
    description: Platform-wide metrics and leaderboards.
  - name: Operations
    description: Minimal operator-facing runtime status outside business metrics.
  - name: Content
    description: CMS-powered homepage content.

x-route-family-migration-matrix:
  source_of_truth_order:
    - backend/server/server.go
    - touched handlers and DTOs under backend/handlers/**
    - backend/docs/openapi.yaml
    - backend/docs/README.md
  reason_vocabulary_owner: handlers.PublicFailureReasons
  public_reason_values:
    - METHOD_NOT_ALLOWED
    - INVALID_REQUEST
    - INVALID_TOKEN
    - AUTHORIZATION_DENIED
    - PASSWORD_CHANGE_REQUIRED
    - NOT_FOUND
    - RATE_LIMITED
    - LOGIN_RATE_LIMITED
    - USER_NOT_FOUND
    - MARKET_NOT_FOUND
    - VALIDATION_FAILED
    - MARKET_CLOSED
    - INSUFFICIENT_BALANCE
    - NO_POSITION
    - INSUFFICIENT_SHARES
    - DUST_CAP_EXCEEDED
    - INTERNAL_ERROR
  plain_text_error_response_state: migration_state_not_target_contract
  validation_stop_review:
    wave: WAVE10
    landed_consolidation:
      - markets create/search use the runtime-injected shared security service for boundary validation and sanitization
      - markets list/search pagination uses security.ParseBoundedIntParam for bounded integer query parsing
      - create/search distinguish INVALID_REQUEST boundary failures from VALIDATION_FAILED domain validation failures
    remaining_boundary_validation_bypasses:
      - family: markets
        gap: resolve, projection, and remaining legacy markets methods still own local path/action parsing; legacy market list/get/details/update failures now use shared failure envelopes
      - family: market-bets-and-positions
        gap: marketId path parsing is duplicated in bets and positions handlers even though failures already use ReasonResponse
      - family: private-actions
        gap: bet and sell request bodies are decoded at the boundary but amount/outcome validation remains domain-first after DTO decode
    next_validation_seam: markets path/action helper gap for market ID, projection amount, resolution outcome, and related failure shaping
    deferred:
      - generic validation registry
      - request-body rewriting middleware
      - validation platform program
      - DB-backed business-rule registry
      - broad output-sanitization campaign
  route_families:
    - family: infra-probes
      paths:
        - /health
        - /readyz
      success_contract: text/plain probe body
      failure_contract: text/plain probe body
      migration_state: intentional_infra_transport
      source: backend/server/server.go registerInfraRoutes
    - family: operator-status
      paths:
        - /ops/status
      success_contract: JSON runtime status `{live,ready,requestFailuresTotal,dbPool}`
      failure_contract: same JSON status with HTTP 503 while not ready
      migration_state: intentional_operator_transport
      source: backend/server/server.go and internal/app/runtime
    - family: infra-docs
      paths:
        - /openapi.yaml
        - /swagger
        - /swagger/
      success_contract: OpenAPI YAML, redirect, or static Swagger UI asset
      failure_contract: router/runtime failure outside application envelope
      migration_state: intentional_unversioned_docs_transport
      source: backend/server/server.go registerInfraRoutes
    - family: runtime-middleware
      paths:
        - all registered routes
      success_contract: not applicable
      failure_contract: JSON `{ok:false,reason}` for 405 and 429
      migration_state: runtime_boundary_envelope
      source: backend/server/server.go and backend/security
    - family: auth
      paths:
        - /v0/login
      success_contract: JSON `{ok:true,result}`
      failure_contract: ReasonResponse
      migration_state: envelope_based
      source: backend/server/server.go and internal/service/auth/loggin.go
    - family: setup
      paths:
        - /v0/setup
        - /v0/setup/frontend
      success_contract: raw JSON DTO
      failure_contract: ReasonResponse plus middleware 429
      migration_state: mixed_raw_success_reason_failure
      source: backend/server/server.go and handlers/setup
    - family: reporting
      paths:
        - /v0/home
        - /v0/stats
        - /v0/system/metrics
        - /v0/global/leaderboard
      success_contract: JSON `{ok:true,result}`
      failure_contract: ReasonResponse plus middleware 429
      migration_state: envelope_based
      source: backend/server/server.go and handlers/stats, handlers/metrics
    - family: markets
      paths:
        - /v0/markets
        - /v0/markets/status
        - /v0/markets/status/{status}
        - /v0/markets/active
        - /v0/markets/closed
        - /v0/markets/resolved
        - /v0/markets/{id}
        - /v0/markets/{id}/resolve
        - /v0/markets/{id}/leaderboard
        - /v0/markets/{id}/projection
        - /v0/marketprojection/{marketId}/{amount}/{outcome}
        - /v0/marketprojection/{marketId}/{amount}/{outcome}/
      success_contract: mixed raw JSON DTO, no-content action, and selected envelope results
      failure_contract: ReasonResponse plus middleware 429
      migration_state: mixed_raw_success_reason_failure
      validation_state: create/search and pagination partially consolidated; detail, resolve, projection, and legacy methods still need path/action helper convergence
      source: backend/server/server.go and handlers/markets
    - family: market-search
      paths:
        - /v0/markets/search
      success_contract: raw JSON SearchResponse
      failure_contract: ReasonResponse plus middleware 429
      migration_state: raw_success_plain_text_failures_retired
      validation_state: shared security service and bounded pagination helper in use
      retired_plain_text_failures: true
      source: backend/server/server.go and handlers/markets/searchmarkets.go
    - family: market-bets-and-positions
      paths:
        - /v0/markets/bets/{marketId}
        - /v0/markets/positions/{marketId}
        - /v0/markets/positions/{marketId}/{username}
      success_contract: JSON `{ok:true,result}`
      failure_contract: ReasonResponse plus middleware 429 where wrapped
      migration_state: envelope_based
      validation_state: reason-shaped failures with duplicated package-local marketId path parsing
      source: backend/server/server.go, handlers/bets, handlers/positions
    - family: public-users
      paths:
        - /v0/userinfo/{username}
        - /v0/usercredit/{username}
        - /v0/portfolio/{username}
        - /v0/users/{username}/financial
      success_contract: raw JSON DTO
      failure_contract: ReasonResponse plus middleware 429
      migration_state: mixed_raw_success_reason_failure
      source: backend/server/server.go and handlers/users
    - family: private-users
      paths:
        - /v0/privateprofile
        - /v0/changepassword
        - /v0/profilechange/displayname
        - /v0/profilechange/emoji
        - /v0/profilechange/description
        - /v0/profilechange/links
      success_contract: JSON `{ok:true,result}`
      failure_contract: ReasonResponse plus middleware 429
      migration_state: envelope_based
      source: backend/server/server.go and handlers/users
    - family: private-actions
      paths:
        - /v0/bet
        - /v0/userposition/{marketId}
        - /v0/sell
      success_contract: JSON `{ok:true,result}`
      failure_contract: ReasonResponse plus middleware 429 and PASSWORD_CHANGE_REQUIRED gate
      migration_state: envelope_based
      validation_state: domain-owned amount/outcome validation after local DTO decode; boundary helper gap remains for any future DTO-level convergence
      source: backend/server/server.go, handlers/bets, handlers/users
    - family: admin-and-content
      paths:
        - /v0/admin/createuser
        - /v0/content/home
        - /v0/admin/content/home
      success_contract: mixed raw JSON DTO and JSON `{ok:true,result}`
      failure_contract: ReasonResponse plus middleware 429 where wrapped
      migration_state: mixed_raw_success_reason_failure
      source: backend/server/server.go, handlers/admin, handlers/cms

paths:
  /health:
    get:
      tags: [Config]
      operationId: getHealth
      summary: Backend health check
      description: >
        Simple process liveness probe that returns "live" while the backend is running.
        It does not report application metrics, downstream dependency reachability,
        or telemetry pipeline status.
      responses:
        '200':
          description: Backend is healthy.
          content:
            text/plain:
              schema:
                type: string
                example: live
        '503':
          description: Backend process is not live.
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/PlainTextErrorResponse'
              example: not live

  /readyz:
    get:
      tags: [Config]
      operationId: getReadiness
      summary: Backend readiness check
      description: >
        Readiness probe that returns "ready" only after startup has completed and
        while the primary database remains reachable for request handling. It is kept
        separate from application metrics and does not report telemetry pipeline status.
      responses:
        '200':
          description: Backend is ready to serve traffic.
          content:
            text/plain:
              schema:
                type: string
                example: ready
        '503':
          description: Backend is not ready to serve traffic.
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/PlainTextErrorResponse'
              example: not ready

  /ops/status:
    get:
      tags: [Operations]
      operationId: getOperationalStatus
      summary: Get backend operational status
      description: >
        Minimal operator-facing runtime status export for the first alert set:
        backend down or unready, fatal startup failure before readiness opens,
        severe server-side request-failure spikes, and database connection pool
        saturation or wait-latency signals affected by pool tuning. The
        request-failure count and pool snapshot are process-local and reset when
        the process restarts. This route is outside the `/v0` business namespace
        and does not expose economy/accounting metrics.
      responses:
        '200':
          description: Backend is live, ready, and serving operator status.
          headers:
            Cache-Control:
              description: Operator status is runtime state and must not be cached.
              schema:
                type: string
                example: no-store
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OperationalStatus'
        '503':
          description: Backend is not live or is not ready to serve traffic.
          headers:
            Cache-Control:
              description: Operator status is runtime state and must not be cached.
              schema:
                type: string
                example: no-store
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OperationalStatus'

  /v0/login:
    post:
      tags: [Auth]
      operationId: loginUser
      summary: Authenticate user
      description: >
        Validates username and password and returns a JWT bearer token for subsequent
        authenticated requests.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '400':
          description: Invalid JSON payload or validation failure.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReasonResponse'
        '401':
          description: Invalid username or password.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReasonResponse'
        '500':
          description: Database access or token creation failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReasonResponse'
        '429':
          description: Login rate limit exceeded by middleware. Other protected routes can also return middleware-level 429 responses as described in the API description.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReasonResponse'

  /v0/home:
    get:
      tags: [Config]
      operationId: getHome
      summary: Backend home
      description: Returns a shared success envelope with a simple backend-availability message.
      responses:
        '200':
          description: Backend responded successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HomeEnvelopeResponse'

  /v0/setup:
    get:
      tags: [Config]
      operationId: getEconomicsConfig
      summary: Get economics configuration
      description: Returns the current economic configuration used by the backend.
      responses:
        '200':
          description: Economics configuration returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Economics'
        '500':
          description: Failed to load or encode configuration.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReasonResponse'
        '429':
          description: Rate limit exceeded by shared security middleware.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReasonResponse'

  /v0/setup/frontend:
    get:
      tags: [Config]
      operationId: getFrontendConfig
      summary: Get frontend configuration
      description: Returns minimal configuration values needed by the frontend, such as chart precision.
      responses:
        '200':
          description: Frontend configuration returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FrontendConfig'
        '500':
          description: Failed to load or encode configuration.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReasonResponse'
        '429':
          description: Rate limit exceeded by shared security middleware.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReasonResponse'

  /openapi.yaml:
    get:
      tags: [Config]
      operationId: getOpenAPIDocument
      summary: Download live OpenAPI document
      description: Returns the embedded OpenAPI YAML document served by the backend.
      responses:
        '200':
          description: OpenAPI document returned.
          content:
            application/yaml:
              schema:
                type: object
                additionalProperties: true

  /swagger:
    get:
      tags: [Config]
      operationId: redirectSwaggerUI
      summary: Redirect to Swagger UI
      description: Redirects to `/swagger/`.
      responses:
        '301':
          description: Swagger UI redirect.

  /swagger/:
    get:
      tags: [Config]
      operationId: getSwaggerUI
      summary: Serve Swagger UI
      description: Serves the embedded Swagger UI static assets rooted at `/swagger/`.
      responses:
        '200':
          description: Swagger UI asset returned.
          content:
            text/html:
              schema:
                type: string

  /v0/markets:
    get:
      tags: [Markets]
      operationId: listMarkets
      summary: List markets
      description: >
        Returns markets with optional filtering by status and creator. When status is
        provided, results are backed by a status-specific query.
      parameters:
        - in: query
          name: status
          required: false
          description: >
            Filter by market status. Accepted values are active, closed, resolved, and all
            (or omitted for all markets).
          schema:
            type: string
            enum: [active, closed, resolved, all]
        - in: query
          name: created_by
          required: false
          description: Only include markets created by the given username.
          schema:
            type: string
        - in: query
          name: limit
          required: false
          description: Maximum number of markets to return.
          schema:
            type: integer
            minimum: 1
            maximum: 100
        - in: query
          name: offset
          required: false
          description: Number of markets to skip before collecting results.
          schema:
            type: integer
            minimum: 0
      responses:
        '200':
          description: Markets returned successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListMarketsResponse'
        '400':
          description: Invalid status filter.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReasonResponse'
        '500':
          description: Unexpected server error while listing markets.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReasonResponse'
        '429':
          description: Rate limit exceeded by shared security middleware.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReasonResponse'
    post:
      tags: [Markets]
      operationId: createMarket
      summary: Create a market
      description: Creates a new prediction market for the authenticated user.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateMarketRequest'
      responses:
        '201':
          description: Market created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MarketResponse'
        '400':
          description: >
            Invalid request body or sanitizer rejection returns `INVALID_REQUEST`;
            syntactically valid domain validation failures return `VALIDATION_FAILED`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReasonResponse'
        '401':
          description: Authentication failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReasonResponse'
        '403':
          description: Password change required before creating markets.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReasonResponse'
        '404':
          description: Authenticated user could not be loaded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReasonResponse'
        '422':
          description: Creator balance does not allow market creation.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReasonResponse'
        '500':
          description: Unexpected server error during market creation.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReasonResponse'

  /v0/markets/search:
    get:
      tags: [Markets]
      operationId: searchMarkets
      summary: Search markets
      description: >
        Searches markets by question title with optional status filtering. Supports both
        "query" and legacy "q" parameters. Success remains the raw SearchResponse DTO;
        handler-owned failures use the shared ReasonResponse contract.
      parameters:
        - in: query
          name: query
          required: false
          description: Search query (preferred parameter name).
          schema:
            type: string
            minLength: 1
            maxLength: 100
        - in: query
          name: q
          required: false
          description: Legacy search query parameter (used if `query` is not provided).
          schema:
            type: string
            minLength: 1
            maxLength: 100
        - in: query
          name: status
          required: false
          description: Filter by market status; same accepted values as /v0/markets.
          schema:
            type: string
            enum: [active, closed, resolved, all]
        - in: query
          name: limit
          required: false
          description: Maximum number of primary results to return.
          schema:
            type: integer
            minimum: 1
            maximum: 50
        - in: query
          name: offset
          required: false
          description: Number of primary results to skip before collecting.
          schema:
            type: integer
            minimum: 0
      responses:
        '200':
          description: Search completed successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchResponse'
        '400':
          description: >
            Missing query parameter, invalid status, or sanitizer-rejected search input
            returns `INVALID_REQUEST`; domain search validation failures return
            `VALIDATION_FAILED`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReasonResponse'
        '500':
          description: Unexpected server error during search.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReasonResponse'
        '429':
          description: Rate limit exceeded by shared security middleware.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReasonResponse'

  /v0/markets/status:
    get:
      tags: [Markets]
      operationId: listAllMarketStatuses
      summary: List markets across all statuses
      description: Convenience endpoint equivalent to `/v0/markets?status=all`.
      parameters:
        - in: query
          name: limit
          required: false
          description: Maximum number of markets to return.
          schema:
            type: integer
            minimum: 1
            maximum: 100
        - in: query
          name: offset
          required: false
          description: Number of markets to skip before collecting results.
          schema:
            type: integer
            minimum: 0
      responses:
        '200':
          description: Markets returned successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListMarketsResponse'
        '500':
          description: Unexpected server error while listing markets.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReasonResponse'
        '429':
          description: Rate limit exceeded by shared security middleware.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReasonResponse'

  /v0/markets/status/{status}:
    get:
      tags: [Markets]
      operationId: listMarketsByStatus
      summary: List markets by status
      description: Returns markets filtered by a specific lifecycle status.
      parameters:
        - in: path
          name: status
          required: true
          description: >
            Market status to filter by. Accepted values are active, closed, resolved, and all.
          schema:
            type: string
            enum: [active, closed, resolved, all]
        - in: query
          name: limit
          required: false
          description: Maximum number of markets to return.
          schema:
            type: integer
            minimum: 1
            maximum: 100
        - in: query
          name: offset
          required: false
          description: Number of markets to skip before collecting results.
          schema:
            type: integer
            minimum: 0
      responses:
        '200':
          description: Markets returned successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListMarketsResponse'
        '400':
          description: Invalid or unsupported status value.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReasonResponse'
        '500':
          description: Unexpected server error while listing markets.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReasonResponse'
        '429':
          description: Rate limit exceeded by shared security middleware.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReasonResponse'

