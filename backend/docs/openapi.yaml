openapi: 3.0.3
info:
  title: SocialPredict API
  version: 0.1.0
  description: >
    HTTP contract for the SocialPredict backend service. This spec is generated
    from the Go handlers and DTOs under backend/server and backend/handlers.
    Routes wrapped by the shared security middleware can return a shared
    transport-level `429 text/plain` response before reaching handler-specific
    JSON envelope logic when the rate limit is exceeded. This middleware
    exception applies across protected routes even when a path omits a repeated
    path-level `429` entry.
servers:
  - url: http://localhost:8080
    description: Local dev server
tags:
  - name: Auth
    description: Authentication and session management.
  - name: Config
    description: Health and configuration endpoints.
  - name: Markets
    description: Market creation, listing, search, and resolution.
  - name: Bets
    description: Placing and selling bets.
  - name: Users
    description: Public and private user profile and financial data.
  - name: Metrics
    description: Platform-wide metrics and leaderboards.
  - name: Content
    description: CMS-powered homepage content.

paths:
  /health:
    get:
      tags: [Config]
      operationId: getHealth
      summary: Backend health check
      description: >
        Simple process liveness probe that returns "ok" while the backend is running.
        It does not report application metrics, downstream dependency reachability,
        or telemetry pipeline status.
      responses:
        '200':
          description: Backend is healthy.
          content:
            text/plain:
              schema:
                type: string
                example: ok

  /readyz:
    get:
      tags: [Config]
      operationId: getReadiness
      summary: Backend readiness check
      description: >
        Readiness probe that returns "ready" only after startup has completed and
        while the primary database remains reachable for request handling. It is kept
        separate from application metrics and does not report telemetry pipeline status.
      responses:
        '200':
          description: Backend is ready to serve traffic.
          content:
            text/plain:
              schema:
                type: string
                example: ready
        '503':
          description: Backend is not ready to serve traffic.
          content:
            text/plain:
              schema:
                type: string
                example: not ready

  /v0/login:
    post:
      tags: [Auth]
      operationId: loginUser
      summary: Authenticate user
      description: >
        Validates username and password and returns a JWT bearer token for subsequent
        authenticated requests.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '400':
          description: Invalid JSON payload or validation failure.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReasonResponse'
        '401':
          description: Invalid username or password.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReasonResponse'
        '500':
          description: Database access or token creation failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReasonResponse'
        '429':
          description: Login rate limit exceeded by middleware. Other protected routes can also return middleware-level 429 responses as described in the API description.
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/PlainTextErrorResponse'

  /v0/home:
    get:
      tags: [Config]
      operationId: getHome
      summary: Backend home
      description: Returns a shared success envelope with a simple backend-availability message.
      responses:
        '200':
          description: Backend responded successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HomeEnvelopeResponse'

  /v0/setup:
    get:
      tags: [Config]
      operationId: getEconomicsConfig
      summary: Get economics configuration
      description: Returns the current economic configuration used by the backend.
      responses:
        '200':
          description: Economics configuration returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Economics'
        '500':
          description: Failed to load or encode configuration.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReasonResponse'
        '429':
          description: Rate limit exceeded by shared security middleware.
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/PlainTextErrorResponse'

  /v0/setup/frontend:
    get:
      tags: [Config]
      operationId: getFrontendConfig
      summary: Get frontend configuration
      description: Returns minimal configuration values needed by the frontend, such as chart precision.
      responses:
        '200':
          description: Frontend configuration returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FrontendConfig'
        '500':
          description: Failed to load or encode configuration.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReasonResponse'
        '429':
          description: Rate limit exceeded by shared security middleware.
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/PlainTextErrorResponse'

  /openapi.yaml:
    get:
      tags: [Config]
      operationId: getOpenAPIDocument
      summary: Download live OpenAPI document
      description: Returns the embedded OpenAPI YAML document served by the backend.
      responses:
        '200':
          description: OpenAPI document returned.
          content:
            application/yaml:
              schema:
                type: object
                additionalProperties: true

  /v0/markets:
    get:
      tags: [Markets]
      operationId: listMarkets
      summary: List markets
      description: >
        Returns markets with optional filtering by status and creator. When status is
        provided, results are backed by a status-specific query.
      parameters:
        - in: query
          name: status
          required: false
          description: >
            Filter by market status. Accepted values are active, closed, resolved, and all
            (or omitted for all markets).
          schema:
            type: string
            enum: [active, closed, resolved, all]
        - in: query
          name: created_by
          required: false
          description: Only include markets created by the given username.
          schema:
            type: string
        - in: query
          name: limit
          required: false
          description: Maximum number of markets to return.
          schema:
            type: integer
            minimum: 1
            maximum: 100
        - in: query
          name: offset
          required: false
          description: Number of markets to skip before collecting results.
          schema:
            type: integer
            minimum: 0
      responses:
        '200':
          description: Markets returned successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListMarketsResponse'
        '400':
          description: Invalid status filter.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReasonResponse'
        '500':
          description: Unexpected server error while listing markets.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReasonResponse'
        '429':
          description: Rate limit exceeded by shared security middleware.
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/PlainTextErrorResponse'
    post:
      tags: [Markets]
      operationId: createMarket
      summary: Create a market
      description: Creates a new prediction market for the authenticated user.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateMarketRequest'
      responses:
        '201':
          description: Market created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MarketResponse'
        '400':
          description: Invalid request body or market validation failure.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReasonResponse'
        '401':
          description: Authentication failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReasonResponse'
        '403':
          description: Password change required before creating markets.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReasonResponse'
        '404':
          description: Authenticated user could not be loaded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReasonResponse'
        '422':
          description: Creator balance does not allow market creation.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReasonResponse'
        '500':
          description: Unexpected server error during market creation.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReasonResponse'

  /v0/markets/search:
    get:
      tags: [Markets]
      operationId: searchMarkets
      summary: Search markets
      description: >
        Searches markets by question title with optional status filtering. Supports both
        "query" and legacy "q" parameters.
      parameters:
        - in: query
          name: query
          required: false
          description: Search query (preferred parameter name).
          schema:
            type: string
            minLength: 1
            maxLength: 100
        - in: query
          name: q
          required: false
          description: Legacy search query parameter (used if `query` is not provided).
          schema:
            type: string
            minLength: 1
            maxLength: 100
        - in: query
          name: status
          required: false
          description: Filter by market status; same accepted values as /v0/markets.
          schema:
            type: string
            enum: [active, closed, resolved, all]
        - in: query
          name: limit
          required: false
          description: Maximum number of primary results to return.
          schema:
            type: integer
            minimum: 1
            maximum: 50
        - in: query
          name: offset
          required: false
          description: Number of primary results to skip before collecting.
          schema:
            type: integer
            minimum: 0
      responses:
        '200':
          description: Search completed successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchResponse'
        '400':
          description: Missing query parameter or invalid status.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReasonResponse'
        '500':
          description: Unexpected server error during search.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReasonResponse'
        '429':
          description: Rate limit exceeded by shared security middleware.
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/PlainTextErrorResponse'

  /v0/markets/status:
    get:
      tags: [Markets]
      operationId: listAllMarketStatuses
      summary: List markets across all statuses
      description: Convenience endpoint equivalent to `/v0/markets?status=all`.
      parameters:
        - in: query
          name: limit
          required: false
          description: Maximum number of markets to return.
          schema:
            type: integer
            minimum: 1
            maximum: 100
        - in: query
          name: offset
          required: false
          description: Number of markets to skip before collecting results.
          schema:
            type: integer
            minimum: 0
      responses:
        '200':
          description: Markets returned successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListMarketsResponse'
        '500':
          description: Unexpected server error while listing markets.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReasonResponse'
        '429':
          description: Rate limit exceeded by shared security middleware.
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/PlainTextErrorResponse'

  /v0/markets/status/{status}:
    get:
      tags: [Markets]
      operationId: listMarketsByStatus
      summary: List markets by status
      description: Returns markets filtered by a specific lifecycle status.
      parameters:
        - in: path
          name: status
          required: true
          description: >
            Market status to filter by. Accepted values are active, closed, resolved, and all.
          schema:
            type: string
            enum: [active, closed, resolved, all]
        - in: query
          name: limit
          required: false
          description: Maximum number of markets to return.
          schema:
            type: integer
            minimum: 1
            maximum: 100
        - in: query
          name: offset
          required: false
          description: Number of markets to skip before collecting results.
          schema:
            type: integer
            minimum: 0
      responses:
        '200':
          description: Markets returned successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListMarketsResponse'
        '400':
          description: Invalid or unsupported status value.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReasonResponse'
        '500':
          description: Unexpected server error while listing markets.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReasonResponse'
        '429':
          description: Rate limit exceeded by shared security middleware.
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/PlainTextErrorResponse'

  /v0/markets/active:
    get:
      tags: [Markets]
      operationId: listActiveMarkets
      summary: List active markets
      description: Legacy convenience endpoint equivalent to `/v0/markets?status=active`.
      parameters:
        - in: query
          name: limit
          required: false
          description: Maximum number of markets to return.
          schema:
            type: integer
            minimum: 1
            maximum: 100
        - in: query
          name: offset
          required: false
          description: Number of markets to skip before collecting results.
          schema:
            type: integer
            minimum: 0
      responses:
        '200':
          description: Markets returned successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListMarketsResponse'
        '500':
          description: Unexpected server error while listing markets.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReasonResponse'
        '429':
          description: Rate limit exceeded by shared security middleware.
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/PlainTextErrorResponse'

  /v0/markets/closed:
    get:
      tags: [Markets]
      operationId: listClosedMarkets
      summary: List closed markets
      description: Legacy convenience endpoint equivalent to `/v0/markets?status=closed`.
      parameters:
        - in: query
          name: limit
          required: false
          description: Maximum number of markets to return.
          schema:
            type: integer
            minimum: 1
            maximum: 100
        - in: query
          name: offset
          required: false
          description: Number of markets to skip before collecting results.
          schema:
            type: integer
            minimum: 0
      responses:
        '200':
          description: Markets returned successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListMarketsResponse'
        '500':
          description: Unexpected server error while listing markets.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReasonResponse'
        '429':
          description: Rate limit exceeded by shared security middleware.
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/PlainTextErrorResponse'

  /v0/markets/resolved:
    get:
      tags: [Markets]
      operationId: listResolvedMarkets
      summary: List resolved markets
      description: Legacy convenience endpoint equivalent to `/v0/markets?status=resolved`.
      parameters:
        - in: query
          name: limit
          required: false
          description: Maximum number of markets to return.
          schema:
            type: integer
            minimum: 1
            maximum: 100
        - in: query
          name: offset
          required: false
          description: Number of markets to skip before collecting results.
          schema:
            type: integer
            minimum: 0
      responses:
        '200':
          description: Markets returned successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListMarketsResponse'
        '500':
          description: Unexpected server error while listing markets.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReasonResponse'
        '429':
          description: Rate limit exceeded by shared security middleware.
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/PlainTextErrorResponse'

  /v0/markets/{id}:
    get:
      tags: [Markets]
      operationId: getMarketDetails
      summary: Get market details
      description: >
        Fetches a single market by its identifier, including probability history and
        aggregate statistics.
      parameters:
        - in: path
          name: id
          required: true
          description: Numeric identifier of the market.
          schema:
            type: integer
            format: int64
            minimum: 1
      responses:
        '200':
          description: Market returned successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MarketDetailsResponse'
        '400':
          description: Invalid market ID.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReasonResponse'
        '404':
          description: Market not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReasonResponse'
        '500':
          description: Unexpected server error while fetching market details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReasonResponse'

  /v0/markets/{id}/resolve:
    post:
      tags: [Markets]
      operationId: resolveMarket
      summary: Resolve a market
      description: Sets the final outcome for a market once it has concluded.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          description: Numeric identifier of the market to resolve.
          schema:
            type: integer
            format: int64
            minimum: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResolveMarketRequest'
      responses:
        '204':
          description: Market resolved successfully; no content is returned.
        '400':
          description: Invalid market ID, malformed request body, or unsupported resolution value.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReasonResponse'
        '401':
          description: Authentication failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReasonResponse'
        '403':
          description: Password change required or the caller is not allowed to resolve this market.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReasonResponse'
        '404':
          description: Market or user not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReasonResponse'
        '409':
          description: Market already resolved or cannot be resolved in its current state.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReasonResponse'
        '500':
          description: Unexpected server error during resolution.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReasonResponse'

  /v0/markets/{id}/leaderboard:
    get:
      tags: [Markets]
      operationId: getMarketLeaderboard
      summary: Get market leaderboard
      description: Ranks participants in a single market by profit and traded volume.
      parameters:
        - in: path
          name: id
          required: true
          description: Numeric identifier of the market.
          schema:
            type: integer
            format: int64
            minimum: 1
        - in: query
          name: limit
          required: false
          description: Maximum number of rows to return.
          schema:
            type: integer
            minimum: 1
        - in: query
          name: offset
          required: false
          description: Number of rows to skip before collecting results.
          schema:
            type: integer
            minimum: 0
      responses:
        '200':
          description: Leaderboard returned successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MarketLeaderboardEnvelopeResponse'
        '400':
          description: Invalid market ID.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReasonResponse'
        '404':
          description: Market not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReasonResponse'
        '500':
          description: Unexpected server error while computing leaderboard.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReasonResponse'
        '429':
          description: Rate limit exceeded by shared security middleware.
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/PlainTextErrorResponse'

  /v0/markets/{id}/projection:
    get:
      tags: [Markets]
      operationId: projectMarketProbability
      summary: Project market probability
      description: >
        Computes the projected probability for a market after a hypothetical bet,
        using the market identifier plus hypothetical bet query parameters.
      parameters:
        - in: path
          name: id
          required: true
          description: Numeric identifier of the market.
          schema:
            type: integer
            format: int64
            minimum: 1
        - in: query
          name: amount
          required: true
          description: Hypothetical integer amount to bet.
          schema:
            type: integer
            format: int64
            minimum: 1
        - in: query
          name: outcome
          required: true
          description: Hypothetical outcome to bet on. Accepted case-insensitive values are YES and NO.
          schema:
            type: string
            pattern: '^(?:[Yy][Ee][Ss]|[Nn][Oo])$'
      responses:
        '200':
          description: Projection computed successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProbabilityProjectionResponse'
        '400':
          description: Invalid market ID or bet parameters.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReasonResponse'
        '404':
          description: Market not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReasonResponse'
        '409':
          description: Market is closed for new probability projections.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReasonResponse'
        '500':
          description: Unexpected server error while computing projection.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReasonResponse'

  /v0/marketprojection/{marketId}/{amount}/{outcome}:
    get:
      tags: [Markets]
      operationId: projectMarketProbabilityLegacy
      summary: Legacy market projection endpoint
      description: >
        Legacy route for computing a probability projection using path parameters
        instead of query parameters.
      parameters:
        - in: path
          name: marketId
          required: true
          schema:
            type: integer
            format: int64
            minimum: 1
        - in: path
          name: amount
          required: true
          schema:
            type: integer
            minimum: 1
        - in: path
          name: outcome
          required: true
          description: Hypothetical outcome to bet on. Accepted case-insensitive values are YES and NO.
          schema:
            type: string
            pattern: '^(?:[Yy][Ee][Ss]|[Nn][Oo])$'
      responses:
        '200':
          description: Projection computed successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProbabilityProjectionResponse'
        '400':
          description: Invalid market ID, amount, or outcome.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReasonResponse'
        '404':
          description: Market not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReasonResponse'
        '409':
          description: Market is closed for new probability projections.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReasonResponse'
        '500':
          description: Unexpected server error while computing projection.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReasonResponse'

  /v0/markets/bets/{marketId}:
    get:
      tags: [Bets, Markets]
      operationId: listMarketBets
      summary: List bets for a market
      description: Returns the bet history for a specific market.
      parameters:
        - in: path
          name: marketId
          required: true
          description: Numeric identifier of the market.
          schema:
            type: integer
            format: int64
            minimum: 1
      responses:
        '200':
          description: Bets returned successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MarketBetsEnvelopeResponse'
        '400':
          description: Invalid market ID.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReasonResponse'
        '404':
          description: Market not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReasonResponse'
        '500':
          description: Unexpected server error while fetching bets.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReasonResponse'
        '429':
          description: Rate limit exceeded by shared security middleware.
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/PlainTextErrorResponse'

  /v0/markets/positions/{marketId}:
    get:
      tags: [Markets]
      operationId: listMarketPositions
      summary: List user positions for a market
      description: Returns all user positions (YES/NO shares) in a specific market.
      parameters:
        - in: path
          name: marketId
          required: true
          description: Numeric identifier of the market.
          schema:
            type: integer
            format: int64
            minimum: 1
      responses:
        '200':
          description: Positions returned successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MarketPositionsEnvelopeResponse'
        '400':
          description: Invalid market ID.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReasonResponse'
        '404':
          description: Market not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReasonResponse'
        '500':
          description: Unexpected server error while fetching positions.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReasonResponse'

  /v0/markets/positions/{marketId}/{username}:
    get:
