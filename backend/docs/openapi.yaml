          type: boolean
          enum: [true]
        result:
          $ref: '#/components/schemas/UserPosition'
      required: [ok, result]

    PlaceBetEnvelopeResponse:
      type: object
      properties:
        ok:
          type: boolean
          enum: [true]
        result:
          $ref: '#/components/schemas/PlaceBetResponse'
      required: [ok, result]

    SellBetEnvelopeResponse:
      type: object
      properties:
        ok:
          type: boolean
          enum: [true]
        result:
          $ref: '#/components/schemas/SellBetResponse'
      required: [ok, result]

    MarketBetsEnvelopeResponse:
      type: object
      properties:
        ok:
          type: boolean
          enum: [true]
        result:
          type: array
          items:
            $ref: '#/components/schemas/MarketBet'
      required: [ok, result]

    PrivateUserEnvelopeResponse:
      type: object
      properties:
        ok:
          type: boolean
          enum: [true]
        result:
          $ref: '#/components/schemas/PrivateUserResponse'
      required: [ok, result]

    HomeContentEnvelopeResponse:
      type: object
      properties:
