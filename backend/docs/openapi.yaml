        '404':
          description: Market not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReasonResponse'
        '409':
          description: Market is closed for new probability projections.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReasonResponse'
        '500':
          description: Unexpected server error while computing projection.
          content:
