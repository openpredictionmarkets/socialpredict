    StatsResponse:
      type: object
      properties:
        financialStats:
          $ref: '#/components/schemas/FinancialStats'
        setupConfiguration:
          $ref: '#/components/schemas/SetupConfiguration'
      required: [financialStats, setupConfiguration]

    FinancialStats:
      type: object
      properties:
        totalMoney:
          type: integer
          format: int64
        totalDebtExtended:
          type: integer
          format: int64
        totalDebtUtilized:
          type: integer
          format: int64
        totalFeesCollected:
          type: integer
          format: int64
        totalBonusesPaid:
          type: integer
          format: int64
        outstandingPayouts:
          type: integer
          format: int64
        totalMoneyInCirculation:
          type: integer
          format: int64
      required:
        [totalMoney, totalDebtExtended, totalDebtUtilized, totalFeesCollected, totalBonusesPaid, outstandingPayouts, totalMoneyInCirculation]

    SetupConfiguration:
      type: object
      properties:
        initialMarketProbability:
          type: number
          format: double
        initialMarketSubsidization:
          type: integer
          format: int64
        initialMarketYes:
          type: integer
          format: int64
        initialMarketNo:
          type: integer
          format: int64
        createMarketCost:
          type: integer
          format: int64
        traderBonus:
          type: integer
          format: int64
        initialAccountBalance:
          type: integer
          format: int64
        maximumDebtAllowed:
          type: integer
          format: int64
        minimumBet:
          type: integer
          format: int64
        maxDustPerSale:
          type: integer
          format: int64
        initialBetFee:
          type: integer
          format: int64
        buySharesFee:
          type: integer
          format: int64
        sellSharesFee:
          type: integer
          format: int64
      required:
        [initialMarketProbability, initialMarketSubsidization, initialMarketYes, initialMarketNo, createMarketCost, traderBonus, initialAccountBalance, maximumDebtAllowed, minimumBet, maxDustPerSale, initialBetFee, buySharesFee, sellSharesFee]

    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
        password:
          type: string

    ChangePasswordEnvelopeResponse:
      type: object
      properties:
        ok:
          type: boolean
          enum: [true]
        result:
          $ref: '#/components/schemas/ChangePasswordResult'
      required: [ok, result]

    ChangePasswordResult:
      type: object
      properties:
        message:
          type: string
          example: Password changed successfully
      required: [message]

    LoginResponse:
      type: object
      required: [ok, result]
      properties:
        ok:
          type: boolean
          enum: [true]
        result:
          $ref: '#/components/schemas/LoginResult'

    LoginResult:
      type: object
      required: [token, username, usertype, mustChangePassword]
      properties:
        token:
          type: string
        username:
          type: string
        usertype:
          type: string
        mustChangePassword:
          type: boolean

    CreateMarketRequest:
      type: object
      required: [questionTitle, outcomeType, resolutionDateTime]
      properties:
        questionTitle:
          type: string
          maxLength: 160
        description:
          type: string
          maxLength: 2000
        outcomeType:
          type: string
        resolutionDateTime:
          type: string
          format: date-time
        yesLabel:
          type: string
          maxLength: 20
        noLabel:
          type: string
          maxLength: 20

    MarketResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        questionTitle:
          type: string
        description:
          type: string
        outcomeType:
          type: string
        resolutionDateTime:
          type: string
          format: date-time
        creatorUsername:
          type: string
        yesLabel:
          type: string
        noLabel:
          type: string
        status:
          type: string
        isResolved:
          type: boolean
        resolutionResult:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreatorResponse:
      type: object
      properties:
        username:
          type: string
        personalEmoji:
          type: string
        displayname:
          type: string

    MarketOverviewResponse:
      type: object
      properties:
        market:
          $ref: '#/components/schemas/MarketResponse'
        creator:
          $ref: '#/components/schemas/CreatorResponse'
        lastProbability:
          type: number
          format: float
        numUsers:
          type: integer
        totalVolume:
          type: integer
          format: int64
        marketDust:
          type: integer
          format: int64

    ListMarketsResponse:
      type: object
