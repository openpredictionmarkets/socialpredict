        markets:
          type: array
          items:
            $ref: '#/components/schemas/MarketOverviewResponse'
        total:
          type: integer

    MarketDetailsResponse:
      type: object
      properties:
        market:
          $ref: '#/components/schemas/PublicMarketResponse'
        creator:
          $ref: '#/components/schemas/CreatorResponse'
        probabilityChanges:
          type: array
          items:
            $ref: '#/components/schemas/ProbabilityChange'
        numUsers:
          type: integer
        totalVolume:
          type: integer
          format: int64
        marketDust:
          type: integer
          format: int64

    PublicMarketResponse:
      type: object
      properties:
        id:
