name: Deploy To Production

on:
  workflow_run:
    workflows: ["Create and publish Docker images"]
    types: [completed]

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: >-
      ${{
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'release'
      }}
    permissions:
      contents: write
    steps:
      - name: Deploy SocialPredict to Production
        uses: peter-evans/repository-dispatch@v4
        with:
          token: ${{ secrets.ANSIBLE_PLAYBOOK_TOKEN }}
          repository: openpredictionmarkets/ansible_playbooks
          event-type: deploy-to-production
          client-payload: >-
            {
              "startup_writer_service": "backend-startup-writer",
              "serving_backend_service": "backend",
              "serving_startup_writer": "false"
            }
