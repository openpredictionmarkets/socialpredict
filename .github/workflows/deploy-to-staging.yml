name: Deploy To Staging

on:
  pull_request:
    branches:
      - main
    types: [closed]
  workflow_dispatch:

concurrency:
  group: deploy-staging
  cancel-in-progress: false

env:
  ANSIBLE_REPOSITORY: openpredictionmarkets/ansible_playbooks
  ANSIBLE_WORKFLOW: Deploy to Staging with Ansible
  STAGING_URL: https://kconfs.com

jobs:
  dispatch-deploy:
    name: Dispatch staging deploy
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true
    permissions:
      contents: read
    outputs:
      dispatched_at: ${{ steps.dispatch-metadata.outputs.dispatched_at }}
    steps:
      - name: Capture dispatch timestamp
        id: dispatch-metadata
        run: echo "dispatched_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Deploy SocialPredict to Staging
        uses: peter-evans/repository-dispatch@v4
        with:
          token: ${{ secrets.ANSIBLE_PLAYBOOK_TOKEN }}
          repository: ${{ env.ANSIBLE_REPOSITORY }}
          event-type: deploy-to-staging
          client-payload: >-
            {
              "startup_writer_service": "backend-startup-writer",
              "serving_backend_service": "backend",
              "serving_startup_writer": "false"
            }

  wait-for-ansible-deploy:
    name: Wait for Ansible staging deploy
    runs-on: ubuntu-latest
    needs: dispatch-deploy
    permissions:
      contents: read
    steps:
      - name: Checkout workflow helpers
        uses: actions/checkout@v4

      - name: Wait for downstream Ansible workflow
        uses: ./.github/actions/wait-for-ansible-workflow
        env:
          GH_TOKEN: ${{ secrets.ANSIBLE_PLAYBOOK_TOKEN }}
        with:
          repository: ${{ env.ANSIBLE_REPOSITORY }}
          workflow: ${{ env.ANSIBLE_WORKFLOW }}
          dispatched-at: ${{ needs.dispatch-deploy.outputs.dispatched_at }}

  verify-public-readiness:
    name: Verify public staging readiness
    runs-on: ubuntu-latest
    needs: wait-for-ansible-deploy
    permissions:
      contents: read
    steps:
      - name: Checkout workflow helpers
        uses: actions/checkout@v4

      - name: Verify public liveness and readiness
        uses: ./.github/actions/verify-public-readiness
        with:
          base-url: ${{ env.STAGING_URL }}
          timeout-seconds: '600'
          interval-seconds: '30'
