name: Deploy To Staging

on:
  pull_request:
    branches:
      - main
    types: [closed]
    paths-ignore:
      - '**/*.md'
      - 'README/**'
      - 'docs/**'
      - 'integrationtest/**/*.md'
      - 'integrationtest/**/*.png'
      - 'integrationtest/**/*.jpg'
      - 'integrationtest/**/*.jpeg'
      - 'integrationtest/**/*.webp'
  workflow_dispatch:

concurrency:
  group: deploy-staging
  cancel-in-progress: false

env:
  ANSIBLE_REPOSITORY: openpredictionmarkets/ansible_playbooks
  ANSIBLE_WORKFLOW: Deploy to Staging with Ansible
  STAGING_URL: https://kconfs.com

jobs:
  scan-candidate-images:
    name: Scan staging candidate images
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true
    permissions:
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: frontend
            dockerfile: docker/frontend/Dockerfile
          - image: backend
            dockerfile: docker/backend/Dockerfile
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build ${{ matrix.image }} staging candidate
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          load: true
          tags: socialpredict-${{ matrix.image }}:staging-candidate
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan ${{ matrix.image }} staging candidate for SARIF security alerts
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: socialpredict-${{ matrix.image }}:staging-candidate
          format: sarif
          output: trivy-${{ matrix.image }}-staging-candidate.sarif
          scanners: vuln,secret
          vuln-type: os,library
          severity: UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL
          ignore-unfixed: false

      - name: Upload ${{ matrix.image }} staging candidate SARIF
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-${{ matrix.image }}-staging-candidate.sarif
          category: trivy-${{ matrix.image }}-staging-candidate

      - name: Block staging deploy on critical ${{ matrix.image }} vulnerabilities
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: socialpredict-${{ matrix.image }}:staging-candidate
          format: table
          scanners: vuln
          vuln-type: os,library
          severity: CRITICAL
          ignore-unfixed: false
          exit-code: '1'

  dispatch-deploy:
    name: Dispatch staging deploy
    runs-on: ubuntu-latest
    needs: scan-candidate-images
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true
    permissions:
      contents: read
    outputs:
      dispatched_at: ${{ steps.dispatch-metadata.outputs.dispatched_at }}
    steps:
      - name: Capture dispatch timestamp
        id: dispatch-metadata
        run: echo "dispatched_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Deploy SocialPredict to Staging
        uses: peter-evans/repository-dispatch@v4
        with:
          token: ${{ secrets.ANSIBLE_PLAYBOOK_TOKEN }}
          repository: ${{ env.ANSIBLE_REPOSITORY }}
          event-type: deploy-to-staging
          client-payload: >-
            {
              "startup_writer_service": "backend-startup-writer",
              "serving_backend_service": "backend",
              "serving_startup_writer": "false"
            }

  wait-for-ansible-deploy:
    name: Wait for Ansible staging deploy
    runs-on: ubuntu-latest
    needs: dispatch-deploy
    permissions:
      contents: read
    steps:
      - name: Checkout workflow helpers
        uses: actions/checkout@v7

      - name: Wait for downstream Ansible workflow
        uses: ./.github/actions/wait-for-ansible-workflow
        env:
          GH_TOKEN: ${{ secrets.ANSIBLE_PLAYBOOK_TOKEN }}
        with:
          repository: ${{ env.ANSIBLE_REPOSITORY }}
          workflow: ${{ env.ANSIBLE_WORKFLOW }}
          dispatched-at: ${{ needs.dispatch-deploy.outputs.dispatched_at }}

  verify-public-readiness:
    name: Verify public staging readiness
    runs-on: ubuntu-latest
    needs: wait-for-ansible-deploy
    permissions:
      contents: read
    steps:
      - name: Checkout workflow helpers
        uses: actions/checkout@v7

      - name: Verify public liveness and readiness
        uses: ./.github/actions/verify-public-readiness
        with:
          base-url: ${{ env.STAGING_URL }}
          timeout-seconds: '600'
          interval-seconds: '30'
