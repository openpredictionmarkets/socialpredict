services:

  db:
    container_name: ${POSTGRES_CONTAINER_NAME}
    image: postgres:16.6-alpine3.20
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DATABASE}
    volumes:
      - ../data/postgres:/var/lib/postgresql/data
    networks:
      - socialpredict_internal_network
    env_file:
      - ../.env

  backend-startup-writer:
    container_name: "${BACKEND_CONTAINER_NAME}-startup-writer"
    image: "${BACKEND_IMAGE_NAME}"
    restart: unless-stopped
    stop_grace_period: 20s
    environment:
      STARTUP_WRITER: "true"
      BACKEND_READINESS_DRAIN_SECONDS: "5"
      BACKEND_SHUTDOWN_TIMEOUT_SECONDS: "10"
    networks:
      - socialpredict_internal_network
    env_file:
      - ../.env
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - \"http://127.0.0.1:$${BACKEND_PORT:-8080}/readyz\" | grep -qx ready"]
      interval: 30s
      timeout: 5s
      start_period: 45s
      retries: 3
    depends_on:
      - db

  backend:
    image: "${BACKEND_IMAGE_NAME}"
    restart: unless-stopped
    stop_grace_period: 20s
    environment:
      STARTUP_WRITER: "false"
      BACKEND_READINESS_DRAIN_SECONDS: "5"
      BACKEND_SHUTDOWN_TIMEOUT_SECONDS: "10"
    networks:
      - socialpredict_internal_network
    env_file:
      - ../.env
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - \"http://127.0.0.1:$${BACKEND_PORT:-8080}/readyz\" | grep -qx ready"]
      interval: 30s
      timeout: 5s
      start_period: 45s
      retries: 3
    depends_on:
      backend-startup-writer:
        condition: service_healthy

  frontend:
    container_name: "${FRONTEND_CONTAINER_NAME}"
    image: "${FRONTEND_IMAGE_NAME}"
    restart: unless-stopped
    networks:
      - socialpredict_internal_network
    env_file:
      - ../.env
    depends_on:
      backend:
        condition: service_healthy

  webserver:
    container_name: "${NGINX_CONTAINER_NAME}"
    image: nginx:latest
    restart: unless-stopped
    environment:
      ENVIRONMENT: ${APP_ENV}
      DOMAIN: ${DOMAIN}
    volumes:
      - ../data/nginx/vhosts/prod:/etc/nginx/templates/
    networks:
      - socialpredict_internal_network
      - socialpredict_external_network
    env_file:
      - ../.env
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.social-predict.rule=Host(`${DOMAIN}`)"

  traefik:
    container_name: "${TRAEFIK_CONTAINER_NAME}"
    image: traefik:v3.5
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    ports:
      - 80:80
      - 443:443
    networks:
      - socialpredict_external_network
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ../data/traefik/config/traefik.yaml:/etc/traefik/traefik.yml:ro
      - ../data/traefik/config/acme.json:/acme.json
      - ../data/traefik/logs/:/logs/

networks:
  socialpredict_internal_network:
    name: socialpredict_internal_network
  socialpredict_external_network:
    name: socialpredict_external_network
    external: true
